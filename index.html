<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>chefin.quest</title>
  <meta name="description" content="A daily browser-native fluid ASCII animation from Chefin." />
  <meta name="daily-ascii-marker" content="DAILY_ASCII_2026-05-24_SOLAR_GLASS_ORCHARD" />
  <!-- DAILY_ASCII_2026-05-24_SOLAR_GLASS_ORCHARD -->
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #02010a;
    }
    body {
      position: fixed;
      inset: 0;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeSpeed;
    }
    #orchard {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      margin: 0;
      padding: 0;
      border: 0;
      overflow: hidden;
      white-space: pre;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      font-weight: 800;
      line-height: .94;
      letter-spacing: -.085em;
      color: #fff7cc;
      background:
        radial-gradient(circle at 18% 28%, rgba(255, 89, 186, .24), transparent 22%),
        radial-gradient(circle at 77% 34%, rgba(36, 227, 255, .22), transparent 25%),
        radial-gradient(circle at 50% 86%, rgba(255, 205, 64, .20), transparent 30%),
        conic-gradient(from 210deg at 50% 52%, #07021d, #121249, #0a3c4b, #41143d, #18051d, #07021d);
      filter: saturate(1.7) contrast(1.1);
      text-shadow:
        0 0 5px currentColor,
        0 0 16px rgba(255, 203, 87, .28),
        0 0 34px rgba(62, 228, 255, .15);
      transform: translateZ(0);
    }
    #orchard::selection { background: transparent; }
    .c0 { color: #030312; text-shadow: none; opacity: .78; }
    .c1 { color: #18133d; text-shadow: none; opacity: .86; }
    .c2 { color: #333080; }
    .c3 { color: #006be8; }
    .c4 { color: #20d8ff; }
    .c5 { color: #3dffcf; }
    .c6 { color: #a5ff73; }
    .c7 { color: #ffe66d; }
    .c8 { color: #ff9b45; }
    .c9 { color: #ff527f; }
    .ca { color: #ff61d8; }
    .cb { color: #b980ff; }
    .cc { color: #f8fbff; }
  </style>
</head>
<body aria-label="Full-screen colorful fluid ASCII animation">
  <pre id="orchard" aria-hidden="true"></pre>
  <script>
    (() => {
      'use strict';

      const MARKER = 'DAILY_ASCII_2026-05-24_SOLAR_GLASS_ORCHARD';
      const field = document.getElementById('orchard');
      const mist = [' ', '·', '˙', '.', ':', ';', '∴', '∷', '⋅'];
      const light = ['+', '*', '✦', '✧', '◆', '◇', '◈', '●', '○', '@'];
      const bough = ['╱', '╲', '│', '┃', '╽', '╿', '╎', '╏'];
      const fruit = ['◐', '◑', '◒', '◓', '◉', '◎'];
      let cols = 0;
      let rows = 0;
      let cellW = 7;
      let cellH = 11;
      let last = 0;
      let frame = 0;

      const clamp = (n, lo, hi) => Math.max(lo, Math.min(hi, n));
      const safe = (s) => s === '&' ? '&amp;' : s === '<' ? '&lt;' : s === '>' ? '&gt;' : s;

      function measure() {
        const probe = document.createElement('span');
        probe.textContent = 'M';
        probe.style.cssText = 'position:absolute;visibility:hidden;font:inherit;letter-spacing:inherit;line-height:inherit;';
        field.appendChild(probe);
        const box = probe.getBoundingClientRect();
        probe.remove();
        cellW = Math.max(4.7, box.width || 7.1);
        cellH = Math.max(7.6, box.height || 11.2);
        cols = clamp(Math.floor(innerWidth / cellW) + 2, 52, 194);
        rows = clamp(Math.floor(innerHeight / cellH) + 2, 30, 98);
      }

      function orchardSignal(x, y, t) {
        const nx = (x / cols) * 2 - 1;
        const ny = (y / rows) * 2 - 1;
        const r = Math.hypot(nx * 1.14, ny * .9);
        const theta = Math.atan2(ny, nx);
        const sunRing = Math.sin(r * 18.5 - t * 2.2 + Math.sin(theta * 6 + t) * .85);
        const aurora = Math.sin(x * .115 + Math.sin(y * .17 + t * .9) * 3.4 - t * 1.55);
        const lattice = Math.cos((nx - ny) * 10.8 + Math.sin((nx + ny) * 4.5 + t * .72));
        const sap = Math.sin((y / rows) * 13.5 + Math.sin(x * .07 + t * 1.8) * 2.8 - t);
        return sunRing * .36 + aurora * .30 + lattice * .22 + sap * .25;
      }

      function glyphFor(x, y, t, energy) {
        const nx = x / cols;
        const ny = y / rows;
        const cx = nx - .5;
        const cy = ny - .55;
        const dist = Math.hypot(cx * 1.38, cy);
        const angle = Math.atan2(cy, cx);

        const trunk = Math.abs(cx + Math.sin(ny * 8.5 + t) * .035) < (.022 + (1 - ny) * .045) && ny > .32;
        const canopy = dist < (.18 + .065 * Math.sin(angle * 7 - t * 1.7)) && ny < .72 && ny > .12;
        const branch = canopy && Math.abs(Math.sin(angle * 9 + dist * 22 - t * 1.2)) < .14;
        const halo = Math.abs(dist - (.29 + .035 * Math.sin(angle * 10 + t * 1.1))) < .023;
        const fruiting = canopy && Math.sin(x * 1.9 + y * 2.7 + t * 3.6) > .91;

        if (fruiting) return fruit[(x + y + frame) % fruit.length];
        if (trunk) return bough[(y + Math.floor(t * 6)) % bough.length];
        if (branch) return bough[Math.abs(Math.floor(angle * 5 + frame)) % bough.length];
        if (halo) return light[(x * 3 + y + frame) % light.length];

        const sparkle = Math.sin(x * 12.9898 + y * 78.233 + Math.floor(t * 9) * 4.91) * 43758.5453;
        const frac = sparkle - Math.floor(sparkle);
        if (frac > .986 - Math.max(0, energy) * .012) return light[(x + frame + Math.floor(frac * 100)) % light.length];
        const idx = clamp(Math.floor((energy + 1.18) * 4.35), 0, mist.length - 1);
        return mist[idx];
      }

      function render(now) {
        if (now - last < 40) {
          requestAnimationFrame(render);
          return;
        }
        last = now;
        frame++;
        const t = now * .001;
        const parts = [];

        for (let y = 0; y < rows; y++) {
          for (let x = 0; x < cols; x++) {
            const nx = x / cols;
            const ny = y / rows;
            const pulse = orchardSignal(x, y, t);
            const dawn = Math.sin((nx * 1.9 - ny * 1.25) * Math.PI + t * .85);
            const rootGlow = Math.max(0, 1 - Math.abs(ny - .86) * 5.5) * Math.sin(x * .18 - t * 2.1);
            const energy = pulse + dawn * .23 + rootGlow * .28;
            const chroma = clamp(Math.floor((energy + 1.35) * 4.45 + Math.sin(t + nx * 8) * 1.2), 0, 12);
            parts.push('<span class="c', chroma.toString(16), '">', safe(glyphFor(x, y, t, energy)), '</span>');
          }
          if (y < rows - 1) parts.push('\n');
        }
        field.innerHTML = parts.join('');
        requestAnimationFrame(render);
      }

      function blockMotion(event) { event.preventDefault(); }
      addEventListener('wheel', blockMotion, { passive: false });
      addEventListener('touchmove', blockMotion, { passive: false });
      addEventListener('keydown', (event) => {
        if ([' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'PageUp', 'PageDown', 'Home', 'End'].includes(event.key)) {
          event.preventDefault();
        }
      }, { passive: false });
      addEventListener('resize', () => { measure(); }, { passive: true });
      addEventListener('orientationchange', () => { setTimeout(measure, 80); }, { passive: true });

      measure();
      field.dataset.marker = MARKER;
      requestAnimationFrame(render);
    })();
  </script>
</body>
</html>
