<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>chefin.quest</title>
  <meta name="description" content="A daily browser-native fluid ASCII animation from Chefin." />
  <meta name="daily-ascii-marker" content="DAILY_ASCII_2026-05-17_PRISMATIC_KELP_STARGATE" />
  <!-- DAILY_ASCII_2026-05-17_PRISMATIC_KELP_STARGATE -->
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #010412;
    }
    body {
      position: fixed;
      inset: 0;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }
    #stargate {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      margin: 0;
      padding: clamp(2px, 0.55vmin, 10px);
      border: 0;
      overflow: hidden;
      white-space: pre;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-weight: 900;
      line-height: 0.82;
      letter-spacing: -0.045em;
      color: #dffcff;
      background:
        radial-gradient(circle at 50% 50%, rgba(113, 255, 229, 0.23), transparent 16%),
        radial-gradient(ellipse at 22% 76%, rgba(27, 255, 139, 0.18), transparent 36%),
        radial-gradient(ellipse at 83% 24%, rgba(255, 66, 189, 0.18), transparent 34%),
        radial-gradient(ellipse at 46% 108%, rgba(0, 111, 255, 0.26), transparent 48%),
        linear-gradient(180deg, #000311 0%, #031833 46%, #050018 100%);
      filter: saturate(1.85) contrast(1.16);
      text-shadow:
        0 0 3px currentColor,
        0 0 11px rgba(88, 253, 255, 0.31),
        0 0 26px rgba(255, 74, 205, 0.18);
      transform: translateZ(0);
    }
    #stargate::selection { background: transparent; }
    .p0 { color: #101a30; text-shadow: none; opacity: 0.78; }
    .p1 { color: #22ff9c; }
    .p2 { color: #35f6ff; }
    .p3 { color: #5f9cff; }
    .p4 { color: #b35cff; }
    .p5 { color: #ff4ec7; }
    .p6 { color: #ffd76d; }
    .p7 { color: #f8fff4; }
    .p8 { color: #ff8757; }
  </style>
</head>
<body aria-label="Full-screen colorful fluid ASCII animation">
  <pre id="stargate" aria-hidden="true"></pre>
  <script>
    (() => {
      'use strict';

      const marker = 'DAILY_ASCII_2026-05-17_PRISMATIC_KELP_STARGATE';
      const pre = document.getElementById('stargate');
      const deep = '     ..,,::--==++**##%%@@';
      const foam = ['·','∙','°','o','○','◌','◍','*','✧','✦','+'];
      const kelp = ['╱','╲','│','┃','╎','╏','∿','⌇','⟆','⟅','{','}'];
      const portal = ['◜','◝','◞','◟','◠','◡','◌','◎','◉','●','◆','◇','✺','✹'];
      const sparks = ['✦','✧','✶','✷','✸','✹','✺','✻','✼','✽'];
      const rune = [
        '      ◜───────◝      ',
        '   ◜── CHEFIN ──◝   ',
        '  ◟── QUEST ∴ GATE ─◞ ',
        '   ◟──  ABYSS  ──◞   ',
        '      ◟───────◞      '
      ];

      let cols = 0;
      let rows = 0;
      let charW = 9;
      let charH = 10;
      let last = 0;
      let frame = 0;
      let raf = 0;
      let runeX = 0;
      let runeY = 0;

      const clamp = (n, a, b) => Math.max(a, Math.min(b, n));
      const esc = (ch) => ch === '&' ? '&amp;' : ch === '<' ? '&lt;' : ch === '>' ? '&gt;' : ch;
      const field = (x, y, t) =>
        Math.sin(x * 0.092 + t * 1.42) +
        Math.cos(y * 0.137 - t * 0.93) +
        Math.sin((x - y) * 0.061 + t * 1.11) +
        Math.cos(Math.hypot(x - cols * 0.5, y - rows * 0.5) * 0.17 - t * 2.15);

      function measure() {
        const probe = document.createElement('span');
        probe.textContent = 'MMMMMMMMMM\nMMMMMMMMMM';
        probe.style.cssText = 'position:absolute;visibility:hidden;white-space:pre;font:inherit;line-height:inherit;letter-spacing:inherit;';
        pre.appendChild(probe);
        const rect = probe.getBoundingClientRect();
        charW = rect.width / 10 || 9;
        charH = rect.height / 2 || 10;
        probe.remove();
      }

      function resize() {
        pre.style.fontSize = `${clamp(Math.min(innerWidth / 78, innerHeight / 36), 7.5, 17)}px`;
        measure();
        const style = getComputedStyle(pre);
        const padX = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
        const padY = parseFloat(style.paddingTop) + parseFloat(style.paddingBottom);
        cols = Math.max(50, Math.floor((innerWidth - padX) / charW));
        rows = Math.max(25, Math.floor((innerHeight - padY) / charH));
        runeX = Math.max(0, Math.floor((cols - rune[0].length) / 2));
        runeY = Math.max(2, Math.floor(rows * 0.47) - 2);
        draw(performance.now());
      }

      function runeChar(x, y) {
        const ry = y - runeY;
        if (ry < 0 || ry >= rune.length) return '';
        const rx = x - runeX;
        if (rx < 0 || rx >= rune[ry].length) return '';
        const ch = rune[ry][rx];
        return ch === ' ' ? '' : ch;
      }

      function draw(now) {
        raf = requestAnimationFrame(draw);
        if (now - last < 40) return;
        last = now;
        frame += 1;
        const t = now * 0.001;
        const cx0 = cols * 0.5 + Math.sin(t * 0.38) * cols * 0.035;
        const cy0 = rows * 0.49 + Math.cos(t * 0.31) * rows * 0.025;
        const out = [];

        for (let y = 0; y < rows; y++) {
          let prevClass = '';
          const yn = (y / rows) - 0.5;
          for (let x = 0; x < cols; x++) {
            const xn = (x / cols) - 0.5;
            const dx = (x - cx0) / Math.max(1, cols);
            const dy = (y - cy0) / Math.max(1, rows);
            const ang = Math.atan2(dy * 1.7, dx * 2.2);
            const rad = Math.hypot(dx * 2.2, dy * 1.7);
            const tide = field(x, y, t) - Math.hypot(xn * 1.25, yn * 1.5) * 1.35;
            const ring = Math.abs(rad - (0.218 + 0.018 * Math.sin(ang * 7 + t * 1.6)));
            const inner = rad < 0.205 + 0.018 * Math.sin(ang * 5 - t * 1.3);
            const kelpSway = Math.sin(y * 0.16 + t * 1.9 + Math.sin(x * 0.05) * 2.0);
            const kelpCol = Math.abs(Math.sin(x * 0.19 + t * 0.45)) < 0.045 + Math.max(0, yn) * 0.095;
            const fish = Math.abs(Math.sin((x + y * 2) * 0.055 - t * 1.55)) < 0.012 && Math.sin(y * 0.2 + t) > 0.45;
            const r = runeChar(x, y);
            let ch = ' ';
            let cls = 'p0';

            if (r) {
              ch = r;
              cls = ['p7','p6','p2','p5'][Math.abs(x + y + frame) % 4];
            } else if (ring < 0.014) {
              ch = portal[Math.abs(Math.floor(ang * 9 + t * 10 + x + y)) % portal.length];
              cls = ['p2','p3','p4','p5','p6','p7'][Math.abs(Math.floor(ang * 4 + frame)) % 6];
            } else if (inner) {
              const spiral = Math.sin(ang * 8 - rad * 56 + t * 5.2);
              ch = sparks[Math.abs(Math.floor((spiral + tide) * 8 + frame)) % sparks.length];
              cls = ['p2','p4','p5','p7'][Math.abs(Math.floor((spiral + 2) * 3 + x)) % 4];
            } else if (y > rows * 0.38 && kelpCol && kelpSway > -0.55 && ((x + y + frame) % 3 !== 0)) {
              ch = kelp[Math.abs(Math.floor(kelpSway * 8 + y + frame)) % kelp.length];
              cls = ['p1','p2','p6'][Math.abs(Math.floor(kelpSway * 4 + x)) % 3];
            } else if (fish && x > cols * 0.06 && x < cols * 0.94) {
              const school = (Math.floor(t * 2 + y) & 1) ? '><>' : '<><';
              ch = school[(x + frame) % 3];
              cls = ['p6','p8','p5','p2'][Math.abs(y + frame) % 4];
            } else if (tide > 0.82 || Math.abs(Math.sin(x * 0.11 + y * 0.23 - t * 2.2)) < 0.028) {
              ch = foam[Math.abs(Math.floor(tide * 9 + x - y + frame)) % foam.length];
              cls = ['p2','p3','p4','p5','p6'][Math.abs(Math.floor(tide * 4 + rad * 9)) % 5];
            } else if (tide > -0.42) {
              const idx = clamp(Math.floor((tide + 0.5) * 8.8), 0, deep.length - 1);
              ch = deep[idx];
              cls = ['p0','p2','p3','p4','p5'][Math.abs(Math.floor((tide + rad + t) * 5)) % 5];
            } else if (((x * 17 + y * 29 + frame) % 211) === 0) {
              ch = '·';
              cls = 'p2';
            }

            if (cls !== prevClass) {
              if (prevClass) out.push('</span>');
              out.push('<span class="', cls, '">');
              prevClass = cls;
            }
            out.push(esc(ch));
          }
          if (prevClass) out.push('</span>');
          if (y !== rows - 1) out.push('\n');
        }
        pre.innerHTML = out.join('');
      }

      function preventScroll(event) { event.preventDefault(); }
      addEventListener('wheel', preventScroll, { passive: false });
      addEventListener('touchmove', preventScroll, { passive: false });
      addEventListener('keydown', (event) => {
        if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','PageUp','PageDown','Home','End',' '].includes(event.key)) {
          event.preventDefault();
        }
      }, { passive: false });
      addEventListener('resize', resize, { passive: true });
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) cancelAnimationFrame(raf);
        else { last = 0; raf = requestAnimationFrame(draw); }
      });

      document.documentElement.dataset.dailyAsciiMarker = marker;
      resize();
    })();
  </script>
</body>
</html>
