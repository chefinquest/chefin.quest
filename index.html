<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>chefin.quest</title>
  <meta name="description" content="A daily fluid ASCII signal from Chefin." />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #02020a;
    }
    body {
      position: fixed;
      inset: 0;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }
    #field {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      margin: 0;
      padding: clamp(8px, 1.8vmin, 22px);
      border: 0;
      overflow: hidden;
      white-space: pre;
      color: #fff;
      background:
        radial-gradient(circle at 18% 24%, rgba(255, 53, 184, 0.22), transparent 31%),
        radial-gradient(circle at 76% 18%, rgba(0, 226, 255, 0.18), transparent 32%),
        radial-gradient(circle at 56% 84%, rgba(255, 214, 10, 0.15), transparent 28%),
        linear-gradient(135deg, #02020a 0%, #06051a 45%, #01030d 100%);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-weight: 800;
      line-height: 0.82;
      letter-spacing: 0.018em;
      filter: saturate(1.35) contrast(1.12);
      text-shadow:
        0 0 5px currentColor,
        0 0 18px rgba(120, 240, 255, 0.28),
        0 0 36px rgba(255, 44, 196, 0.18);
      transform: translateZ(0);
    }
    #field::selection { background: transparent; }
    .no-js {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      color: #78f6ff;
      background: #02020a;
      font: 700 4vw/1 ui-monospace, monospace;
      overflow: hidden;
    }
  </style>
</head>
<body aria-label="Animated fluid ASCII artwork for chefin.quest">
  <pre id="field" aria-hidden="true"></pre>
  <noscript><pre class="no-js">chefin.quest</pre></noscript>
  <script>
    (() => {
      'use strict';

      const field = document.getElementById('field');
      const glyphs = ' .,:;i!lI?+/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$█▓▒░';
      const runes = ['✦', '✧', '◆', '◇', '●', '◉', '▲', '△', '▰', '▱', '▣', '▢'];
      const signature = [
        '   ____ _           __ _       ',
        '  / ___| |__   ___ / _(_)_ __  ',
        ' | |   | `_ \\ / _ \\ |_| | `_ \\ ',
        ' | |___| | | |  __/  _| | | | |',
        '  \\____|_| |_|\\___|_| |_|_| |_|',
        '          .quest              '
      ];

      let cols = 80;
      let rows = 40;
      let cell = 12;
      let raf = 0;
      let last = 0;

      const clamp = (n, a, b) => Math.max(a, Math.min(b, n));
      const wave = (x, y, t) => {
        const cx = x - cols * 0.5;
        const cy = y - rows * 0.5;
        const r = Math.hypot(cx, cy);
        const a = Math.atan2(cy, cx);
        return (
          Math.sin(x * 0.17 + t * 1.28 + Math.sin(y * 0.071 + t * 0.74) * 2.2) +
          Math.cos(y * 0.23 - t * 1.05 + Math.sin(x * 0.041 - t * 0.42) * 3.1) +
          Math.sin(r * 0.16 - t * 2.05 + a * 3.0) +
          Math.cos((x + y) * 0.068 + t * 1.43) +
          Math.sin((x - y) * 0.082 - t * 0.92)
        ) / 5;
      };

      function resize() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        cell = clamp(Math.floor(Math.min(w / 78, h / 42)), 7, 18);
        field.style.fontSize = `${cell}px`;
        const pad = Math.max(8, Math.min(22, Math.floor(Math.min(w, h) * 0.018)));
        cols = Math.max(42, Math.floor((w - pad * 2) / (cell * 0.62)));
        rows = Math.max(24, Math.floor((h - pad * 2) / (cell * 0.82)));
      }

      function hueFor(x, y, t, v) {
        return (210 + 118 * Math.sin(t * 0.19 + x * 0.036) + 92 * Math.cos(t * 0.27 + y * 0.052) + v * 86 + 360) % 360;
      }

      function paint(now) {
        const t = now * 0.001;
        if (now - last < 44) {
          raf = requestAnimationFrame(paint);
          return;
        }
        last = now;

        const logoW = signature[0].length;
        const logoH = signature.length;
        const logoX = Math.floor((cols - logoW) / 2);
        const logoY = Math.floor((rows - logoH) / 2);

        let html = '';
        for (let y = 0; y < rows; y++) {
          let line = '';
          for (let x = 0; x < cols; x++) {
            const lx = x - logoX;
            const ly = y - logoY;
            const logoChar = ly >= 0 && ly < logoH && lx >= 0 && lx < logoW ? signature[ly][lx] : '';
            const v = wave(x, y, t);
            const shimmer = Math.sin((x * 12.9898 + y * 78.233 + Math.floor(t * 6)) * 43758.5453);
            let idx = Math.floor(((v + 1) * 0.5) * (glyphs.length - 1));
            idx = clamp(idx + (shimmer > 0.986 ? 10 : 0), 0, glyphs.length - 1);
            let ch = glyphs[idx];

            const ring = Math.abs(Math.hypot(x - cols * 0.5, (y - rows * 0.5) * 1.42) - (Math.min(cols, rows) * (0.28 + 0.055 * Math.sin(t * 0.81)))) < 0.55;
            if (ring && ((x + y + Math.floor(t * 8)) % 5 === 0)) ch = runes[(x + y + Math.floor(t * 3)) % runes.length];
            if (logoChar && logoChar !== ' ') ch = logoChar;

            const hue = hueFor(x, y, t, v) + (logoChar ? 34 : 0);
            const light = logoChar ? 76 : 54 + Math.floor(20 * ((v + 1) * 0.5));
            const alpha = logoChar ? 1 : 0.73 + 0.27 * ((v + 1) * 0.5);
            line += `<span style="color:hsla(${hue.toFixed(1)},100%,${light}%,${alpha.toFixed(2)})">${ch === ' ' ? '&nbsp;' : ch}</span>`;
          }
          html += line + (y === rows - 1 ? '' : '\n');
        }
        field.innerHTML = html;
        raf = requestAnimationFrame(paint);
      }

      window.addEventListener('resize', resize, { passive: true });
      window.addEventListener('orientationchange', resize, { passive: true });
      document.addEventListener('wheel', e => e.preventDefault(), { passive: false });
      document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
      window.addEventListener('keydown', e => {
        if ([' ', 'ArrowUp', 'ArrowDown', 'PageUp', 'PageDown', 'Home', 'End'].includes(e.key)) e.preventDefault();
      }, { passive: false });

      resize();
      raf = requestAnimationFrame(paint);
      window.addEventListener('pagehide', () => cancelAnimationFrame(raf));
    })();
  </script>
</body>
</html>
