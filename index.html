<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>chefin.quest</title>
  <meta name="description" content="A daily browser-native fluid ASCII animation from Chefin." />
  <meta name="daily-ascii-marker" content="DAILY_ASCII_2026-05-20_AURORA_FORGE_MOTH_SPIRAL" />
  <!-- DAILY_ASCII_2026-05-20_AURORA_FORGE_MOTH_SPIRAL -->
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #02010a;
    }
    body {
      position: fixed;
      inset: 0;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }
    #field {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      margin: 0;
      padding: clamp(2px, 0.38vmin, 6px);
      border: 0;
      overflow: hidden;
      white-space: pre;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.055em;
      color: #f5fff8;
      background:
        radial-gradient(circle at 50% 49%, rgba(255, 239, 148, 0.18), transparent 17%),
        radial-gradient(ellipse at 20% 30%, rgba(39, 255, 178, 0.18), transparent 32%),
        radial-gradient(ellipse at 82% 24%, rgba(204, 74, 255, 0.17), transparent 31%),
        radial-gradient(ellipse at 48% 78%, rgba(255, 98, 45, 0.17), transparent 38%),
        linear-gradient(180deg, #050016 0%, #06132b 34%, #061f24 62%, #18050f 100%);
      filter: saturate(1.85) contrast(1.14);
      text-shadow:
        0 0 3px currentColor,
        0 0 11px rgba(98, 255, 198, 0.25),
        0 0 25px rgba(255, 112, 54, 0.16);
      transform: translateZ(0);
    }
    #field::selection { background: transparent; }
    .p0 { color: #06172a; text-shadow: none; opacity: 0.76; }
    .p1 { color: #22ffc6; }
    .p2 { color: #5cf0ff; }
    .p3 { color: #5f7cff; }
    .p4 { color: #bd69ff; }
    .p5 { color: #ff5fcf; }
    .p6 { color: #ff7a39; }
    .p7 { color: #ffe26d; }
    .p8 { color: #f7fff7; }
    .p9 { color: #8cff5d; }
    .pa { color: #243a58; text-shadow: 0 0 5px rgba(92,240,255,.12); opacity: .86; }
  </style>
</head>
<body aria-label="Full-screen colorful fluid ASCII animation">
  <pre id="field" aria-hidden="true"></pre>
  <script>
    (() => {
      'use strict';

      const marker = 'DAILY_ASCII_2026-05-20_AURORA_FORGE_MOTH_SPIRAL';
      const field = document.getElementById('field');
      const glyphs = [' ', '.', '`', ',', ':', ';', '-', '~', '=', '+', '*', 'x', '%', '#', '@', '◆', '✦', '✧', '◇', '▲'];
      const veins = ['╱', '╲', '│', '─', '╳', '╋', '╭', '╮', '╰', '╯'];
      const logo = ['CHEFIN', 'QUEST'];
      let cols = 0;
      let rows = 0;
      let lastFrame = 0;
      let cached = '';

      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
      const pickClass = (v, heat, wing, ember) => {
        if (heat > 1.58) return 'p8';
        if (ember > 0.72) return 'p6';
        if (wing > 0.68) return v > 0.52 ? 'p7' : 'p5';
        if (v < -0.58) return 'p0';
        if (v < -0.2) return 'pa';
        return ['p1', 'p2', 'p3', 'p4', 'p5', 'p9'][Math.abs((v * 19 + heat * 7) | 0) % 6];
      };

      function measure() {
        const probe = document.createElement('span');
        probe.textContent = 'M';
        probe.style.visibility = 'hidden';
        field.appendChild(probe);
        const rect = probe.getBoundingClientRect();
        probe.remove();
        const charW = Math.max(5.4, rect.width || 7);
        const charH = Math.max(8.5, rect.height || 11);
        const style = getComputedStyle(field);
        const padX = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
        const padY = parseFloat(style.paddingTop) + parseFloat(style.paddingBottom);
        cols = clamp(Math.floor((innerWidth - padX) / charW), 52, 156);
        rows = clamp(Math.floor((innerHeight - padY) / charH), 28, 72);
      }

      function sigChar(x, y) {
        const sx = Math.floor(cols / 2 - logo[0].length / 2);
        const sy = Math.floor(rows * 0.51) - 1;
        if (y === sy && x >= sx && x < sx + logo[0].length) return logo[0][x - sx];
        const sx2 = Math.floor(cols / 2 - logo[1].length / 2);
        if (y === sy + 2 && x >= sx2 && x < sx2 + logo[1].length) return logo[1][x - sx2];
        return '';
      }

      function render(ms) {
        if (ms - lastFrame < 42) {
          requestAnimationFrame(render);
          return;
        }
        lastFrame = ms;
        const t = ms * 0.001;
        const cx = (cols - 1) / 2;
        const cy = (rows - 1) / 2;
        const aspect = cols / Math.max(1, rows);
        let html = '';

        for (let y = 0; y < rows; y++) {
          const ny = (y - cy) / rows * 2.35;
          for (let x = 0; x < cols; x++) {
            const nx = (x - cx) / cols * 2.35 * aspect;
            const r = Math.hypot(nx * 0.88, ny * 1.22) + 0.0001;
            const theta = Math.atan2(ny * 1.4, nx);

            const leftWing = Math.exp(-Math.pow(nx + 0.43 + Math.sin(t * 0.7) * 0.04, 2) * 7.3 - Math.pow(ny + Math.sin(theta * 3 + t) * 0.14, 2) * 2.0);
            const rightWing = Math.exp(-Math.pow(nx - 0.43 - Math.cos(t * 0.64) * 0.04, 2) * 7.3 - Math.pow(ny - Math.sin(theta * 3 - t) * 0.14, 2) * 2.0);
            const wing = leftWing + rightWing;
            const body = Math.exp(-Math.pow(nx, 2) * 72 - Math.pow(ny, 2) * 4.8);
            const forge = Math.exp(-Math.pow(r * 2.2 - 0.92 - Math.sin(t * 1.1) * 0.08, 2) * 9);
            const spiral = Math.sin(13.0 * r - 4.2 * theta - t * 3.1);
            const aurora = Math.sin((nx * 4.6) + Math.cos(ny * 3.2 + t * 0.8) * 2.2 + t * 1.55);
            const ember = Math.sin((x * 0.47) - (y * 0.31) + t * 7.0 + Math.sin(r * 5.0)) * forge;
            const flame = Math.sin(1.8 / r + theta * 5.0 + t * 2.0) * 0.34;
            const v = aurora * 0.35 + spiral * 0.32 + flame + wing * 1.12 + body * 1.42 + forge * 0.45;
            const heat = body + wing + forge + Math.max(0, ember);

            let idx = clamp(Math.floor((v + 1.05) * 6.2), 0, glyphs.length - 1);
            let ch = glyphs[idx];
            const sig = sigChar(x, y);
            if (sig && wing + body + forge > 0.22) {
              ch = sig;
              idx = glyphs.length - 1;
            } else if (body > 0.58) {
              ch = y % 2 ? '║' : '┃';
            } else if (wing > 0.72 && Math.abs(spiral) > 0.78) {
              ch = veins[Math.abs((theta * 9 + t * 3) | 0) % veins.length];
            } else if (ember > 0.76) {
              ch = ['*', '✦', '✧', '◆'][Math.abs((x + y + t * 9) | 0) % 4];
            } else if (Math.abs(spiral) > 0.93 && r < 1.2) {
              ch = spiral > 0 ? '╱' : '╲';
            }

            html += '<span class="' + pickClass(v, heat, wing, ember) + '">' + ch + '</span>';
          }
          if (y !== rows - 1) html += '\n';
        }
        if (html !== cached) {
          field.innerHTML = html;
          cached = html;
        }
        requestAnimationFrame(render);
      }

      function resize() {
        const size = clamp(Math.min(innerWidth / 74, innerHeight / 38), 7.2, 16.5);
        field.style.fontSize = size.toFixed(2) + 'px';
        measure();
        cached = '';
      }

      const prevent = event => event.preventDefault();
      const scrollKeys = new Set(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'PageUp', 'PageDown', 'Home', 'End']);
      addEventListener('wheel', prevent, { passive: false });
      addEventListener('touchmove', prevent, { passive: false });
      addEventListener('keydown', event => { if (scrollKeys.has(event.key)) event.preventDefault(); }, { passive: false });
      addEventListener('resize', resize, { passive: true });
      addEventListener('orientationchange', resize, { passive: true });
      document.documentElement.dataset.marker = marker;
      resize();
      requestAnimationFrame(render);
    })();
  </script>
</body>
</html>
