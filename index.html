<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>chefin.quest</title>
  <meta name="description" content="A daily browser-native fluid ASCII animation from Chefin." />
  <meta name="daily-ascii-marker" content="DAILY_ASCII_2026-05-21_PRISMATIC_KELP_CATHEDRAL" />
  <!-- DAILY_ASCII_2026-05-21_PRISMATIC_KELP_CATHEDRAL -->
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #01040d;
    }
    body {
      position: fixed;
      inset: 0;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }
    #ocean {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      margin: 0;
      padding: clamp(2px, 0.45vmin, 7px);
      border: 0;
      overflow: hidden;
      white-space: pre;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      font-weight: 900;
      line-height: 0.88;
      letter-spacing: -0.06em;
      color: #dffff8;
      background:
        radial-gradient(ellipse at 50% 102%, rgba(28, 255, 191, 0.22), transparent 38%),
        radial-gradient(circle at 26% 20%, rgba(255, 73, 188, 0.18), transparent 25%),
        radial-gradient(circle at 78% 18%, rgba(69, 151, 255, 0.21), transparent 27%),
        radial-gradient(ellipse at 50% 42%, rgba(191, 116, 255, 0.12), transparent 45%),
        linear-gradient(180deg, #030113 0%, #021733 35%, #002a31 66%, #04110b 100%);
      filter: saturate(1.9) contrast(1.12);
      text-shadow:
        0 0 3px currentColor,
        0 0 12px rgba(57, 252, 214, 0.26),
        0 0 28px rgba(255, 80, 196, 0.15);
      transform: translateZ(0);
    }
    #ocean::selection { background: transparent; }
    .d0 { color: #041326; text-shadow: none; opacity: .74; }
    .d1 { color: #0a3d57; text-shadow: 0 0 5px rgba(44, 165, 255, .12); opacity: .82; }
    .d2 { color: #16e8ff; }
    .d3 { color: #20ffc7; }
    .d4 { color: #a5ff6f; }
    .d5 { color: #fff26d; }
    .d6 { color: #ff9d43; }
    .d7 { color: #ff58cb; }
    .d8 { color: #b56cff; }
    .d9 { color: #f3fff9; }
    .da { color: #4e7bff; }
  </style>
</head>
<body aria-label="Full-screen colorful fluid ASCII animation">
  <pre id="ocean" aria-hidden="true"></pre>
  <script>
    (() => {
      'use strict';

      const marker = 'DAILY_ASCII_2026-05-21_PRISMATIC_KELP_CATHEDRAL';
      const ocean = document.getElementById('ocean');
      const glyphs = ['·', '.', '·', '`', ',', ':', ';', '~', '-', '=', '+', '*', 'x', '%', '#', '@', '◇', '◆', '✧', '✦'];
      const fronds = ['╱', '╲', '│', '┃', '╎', '╏', '╽', '╿', '╳'];
      const glass = ['△', '▽', '◇', '◈', '◆', '✧', '✦', '●'];
      const sig = ['CHEFIN', 'QUEST'];
      let cols = 0;
      let rows = 0;
      let last = 0;
      let cache = '';

      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
      const esc = ch => ch === '&' ? '&amp;' : ch === '<' ? '&lt;' : ch === '>' ? '&gt;' : ch;

      function measure() {
        const probe = document.createElement('span');
        probe.textContent = 'M';
        probe.style.visibility = 'hidden';
        ocean.appendChild(probe);
        const rect = probe.getBoundingClientRect();
        probe.remove();
        const style = getComputedStyle(ocean);
        const padX = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
        const padY = parseFloat(style.paddingTop) + parseFloat(style.paddingBottom);
        const lineH = parseFloat(style.lineHeight) || rect.height || 11;
        const charW = Math.max(5.2, rect.width || 7);
        const charH = Math.max(6.2, lineH);
        cols = clamp(Math.floor((innerWidth - padX) / charW), 54, 164);
        rows = clamp(Math.floor((innerHeight - padY) / charH), 30, 76);
      }

      function signature(x, y, glow) {
        const sy = Math.floor(rows * 0.47);
        const sx0 = Math.floor(cols * 0.5 - sig[0].length * 0.5);
        const sx1 = Math.floor(cols * 0.5 - sig[1].length * 0.5);
        if (glow < 0.2) return '';
        if (y === sy && x >= sx0 && x < sx0 + sig[0].length) return sig[0][x - sx0];
        if (y === sy + 2 && x >= sx1 && x < sx1 + sig[1].length) return sig[1][x - sx1];
        return '';
      }

      function shade(v, reef, lantern, kelp, ray, depth) {
        if (lantern > .82 || reef > 1.45) return 'd9';
        if (kelp > .72) return ray > 0 ? 'd3' : 'd4';
        if (reef > .95) return v > .4 ? 'd7' : 'd8';
        if (ray > .78) return 'd5';
        if (v < -.72 || depth > .78) return 'd0';
        if (v < -.35) return 'd1';
        return ['d2', 'd3', 'da', 'd8', 'd7', 'd6'][Math.abs((v * 23 + reef * 13 + lantern * 17) | 0) % 6];
      }

      function render(ms) {
        if (ms - last < 43) {
          requestAnimationFrame(render);
          return;
        }
        last = ms;
        const t = ms * 0.001;
        const cx = (cols - 1) / 2;
        const cy = (rows - 1) / 2;
        const aspect = cols / Math.max(1, rows);
        let html = '';

        for (let y = 0; y < rows; y++) {
          const py = y / Math.max(1, rows - 1);
          const ny = (y - cy) / rows * 2.2;
          for (let x = 0; x < cols; x++) {
            const px = x / Math.max(1, cols - 1);
            const nx = (x - cx) / cols * 2.2 * aspect;
            const r = Math.hypot(nx * .92, ny * 1.12) + .0001;
            const a = Math.atan2(ny, nx);

            const tide = Math.sin(nx * 4.8 + Math.sin(ny * 3.4 + t * .7) * 1.7 - t * 1.1);
            const caustic = Math.sin((nx + ny) * 10.5 + Math.sin(r * 7.0 - t * 1.6) * 2.5 + t * 2.2);
            const rose = Math.sin(9.0 * r - 5.0 * a + t * 1.9) * Math.exp(-r * .55);
            const columns = Math.pow(Math.max(0, Math.cos((px - .5) * Math.PI * 5.0 + Math.sin(t * .55) * .55)), 9) * (1 - py * .52);
            const arch = Math.exp(-Math.pow(r * 1.9 - .92 - Math.sin(t * .5) * .04, 2) * 12.0) * (1 - py * .28);
            const kelp = Math.pow(Math.max(0, Math.sin((x * .24) + Math.sin(py * 9 + t) * 1.4)), 6) * Math.pow(py, 1.28);
            const sway = Math.sin(y * .31 + t * 2.0 + Math.sin(x * .09)) * kelp;
            const lanternA = Math.exp(-Math.pow(nx + .48 + Math.sin(t * .61) * .05, 2) * 28 - Math.pow(ny + .10 + Math.cos(t * .77) * .08, 2) * 18);
            const lanternB = Math.exp(-Math.pow(nx - .50 + Math.cos(t * .53) * .06, 2) * 28 - Math.pow(ny + .18 + Math.sin(t * .69) * .08, 2) * 18);
            const lanternC = Math.exp(-Math.pow(nx + Math.sin(t * .4) * .08, 2) * 20 - Math.pow(ny - .42 + Math.cos(t * .48) * .05, 2) * 20);
            const lantern = lanternA + lanternB + lanternC;
            const reef = arch + columns * .85 + Math.max(0, rose) * .44;
            const ray = Math.max(0, caustic) * (1 - py * .35) + columns * .62;
            const seabed = Math.max(0, py - .70) * (0.55 + 0.45 * Math.sin(x * .37 + t * 1.5 + Math.sin(y * .2)));
            const depth = py * py - lantern * .25 - seabed * .4;
            const value = tide * .31 + caustic * .27 + rose * .48 + reef * .88 + kelp * 1.2 + lantern * 1.35 + seabed * .92 - depth * .28;

            let idx = clamp(Math.floor((value + 1.1) * 6.4), 0, glyphs.length - 1);
            let ch = glyphs[idx];
            const word = signature(x, y, reef + lantern + columns);
            if (word) {
              ch = word;
            } else if (lantern > .74) {
              ch = glass[Math.abs((x + y + t * 8) | 0) % glass.length];
            } else if (kelp > .68) {
              ch = fronds[Math.abs((sway * 11 + x + y) | 0) % fronds.length];
            } else if (columns > .58) {
              ch = y % 3 === 0 ? '╬' : (y % 2 ? '║' : '┃');
            } else if (arch > .62 && Math.abs(rose) > .35) {
              ch = rose > 0 ? '╱' : '╲';
            } else if (ray > .88 && py < .76) {
              ch = ['/', '|', '\\', '✧'][Math.abs((x * 3 - y + t * 5) | 0) % 4];
            } else if (seabed > .17) {
              ch = ['░', '▒', '▓', '◆', '◇', '✦'][Math.abs((x + y * 5 + t * 4) | 0) % 6];
            }
            html += '<span class="' + shade(value, reef, lantern, kelp, ray, depth) + '">' + esc(ch) + '</span>';
          }
          if (y !== rows - 1) html += '\n';
        }
        if (html !== cache) {
          ocean.innerHTML = html;
          cache = html;
        }
        requestAnimationFrame(render);
      }

      function resize() {
        const size = clamp(Math.min(innerWidth / 78, innerHeight / 40), 7.0, 16.2);
        ocean.style.fontSize = size.toFixed(2) + 'px';
        measure();
        cache = '';
      }

      const prevent = event => event.preventDefault();
      const scrollKeys = new Set(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'PageUp', 'PageDown', 'Home', 'End']);
      addEventListener('wheel', prevent, { passive: false });
      addEventListener('touchmove', prevent, { passive: false });
      addEventListener('keydown', event => { if (scrollKeys.has(event.key)) event.preventDefault(); }, { passive: false });
      addEventListener('resize', resize, { passive: true });
      addEventListener('orientationchange', resize, { passive: true });
      document.documentElement.dataset.marker = marker;
      resize();
      requestAnimationFrame(render);
    })();
  </script>
</body>
</html>
