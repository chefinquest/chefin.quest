<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>chefin.quest</title>
  <meta name="description" content="A daily browser-native fluid ASCII animation from Chefin." />
  <meta name="daily-ascii-marker" content="DAILY_ASCII_2026-05-15_NEON_TIDE_CARTOGRAPHY" />
  <!-- DAILY_ASCII_2026-05-15_NEON_TIDE_CARTOGRAPHY -->
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #01040d;
    }
    body {
      position: fixed;
      inset: 0;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }
    #tide-map {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      margin: 0;
      padding: clamp(4px, 0.95vmin, 14px);
      border: 0;
      overflow: hidden;
      white-space: pre;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-weight: 800;
      line-height: 0.82;
      letter-spacing: -0.026em;
      color: #eaffff;
      background:
        radial-gradient(circle at 50% 50%, rgba(69, 255, 230, 0.14), transparent 17%),
        radial-gradient(ellipse at 18% 76%, rgba(0, 102, 255, 0.25), transparent 36%),
        radial-gradient(ellipse at 82% 20%, rgba(255, 41, 159, 0.20), transparent 34%),
        radial-gradient(ellipse at 66% 86%, rgba(255, 202, 56, 0.15), transparent 30%),
        linear-gradient(145deg, #00030a 0%, #031322 43%, #10051b 73%, #03020a 100%);
      filter: saturate(1.65) contrast(1.16);
      text-shadow:
        0 0 3px currentColor,
        0 0 13px rgba(66, 255, 242, 0.22),
        0 0 28px rgba(255, 61, 172, 0.14);
      transform: translateZ(0);
    }
    #tide-map::selection { background: transparent; }
  </style>
</head>
<body aria-label="Full-screen colorful fluid ASCII animation">
  <pre id="tide-map" aria-hidden="true"></pre>
  <script>
    (() => {
      'use strict';

      const marker = 'DAILY_ASCII_2026-05-15_NEON_TIDE_CARTOGRAPHY';
      const pre = document.getElementById('tide-map');
      const depths = '    ┬╖┬╖┬╖...,,,---~~~:::===+++***###%%%@@@';
      const contour = ['тХн', 'тХо', 'тХп', 'тХ░', 'тФА', 'тФВ', 'тХ▒', 'тХ▓', 'тФД', 'тФЖ'];
      const foam = ['тИ┤', 'тИ╡', 'тЛ░', 'тЛ▒', 'тЛп', 'тЛо', 'таВ', 'таД', 'таЖ', 'таТ'];
      const sparks = ['тЬж', 'тЬз', 'тЬ╢', 'тЬ║', 'тЬ╣', 'тЬ╖', 'тЧЖ', 'тЧЗ', 'тЧИ', 'тЧМ'];
      const compass = [
        '          тЧЗ          ',
        '       тХ▓  тФВ  тХ▒       ',
        '    тЧЗтФАтФА CHEFIN тФАтФАтЧЗ   ',
        '       тХ▒ QUEST тХ▓     ',
        '          тЧЗ          '
      ];

      let cols = 80;
      let rows = 40;
      let font = 11;
      let pad = 8;
      let raf = 0;
      let previous = 0;

      const clamp = (n, a, b) => Math.max(a, Math.min(b, n));
      const esc = ch => ch === '&' ? '&amp;' : ch === '<' ? '&lt;' : ch === '>' ? '&gt;' : ch === ' ' ? '&nbsp;' : ch;

      function resize() {
        const w = innerWidth;
        const h = innerHeight;
        font = clamp(Math.floor(Math.min(w / 104, h / 55)), 7, 16);
        pad = clamp(Math.floor(Math.min(w, h) * 0.0095), 4, 14);
        pre.style.fontSize = `${font}px`;
        pre.style.padding = `${pad}px`;
        cols = Math.max(52, Math.floor((w - pad * 2) / (font * 0.548)));
        rows = Math.max(26, Math.floor((h - pad * 2) / (font * 0.82)));
      }

      function island(x, y, t) {
        const cx = cols * (0.50 + 0.035 * Math.sin(t * 0.31));
        const cy = rows * (0.50 + 0.025 * Math.cos(t * 0.24));
        const dx = (x - cx) / Math.max(1, cols);
        const dy = (y - cy) / Math.max(1, rows);
        const angle = Math.atan2(dy, dx);
        const radius = Math.hypot(dx * 1.68, dy * 1.22);
        return { angle, radius };
      }

      function tide(x, y, t) {
        const nx = x / Math.max(1, cols - 1);
        const ny = y / Math.max(1, rows - 1);
        const isle = island(x, y, t);
        const gyre = Math.sin(isle.radius * 36.0 - t * 2.0 + isle.angle * 5.0);
        const currentA = Math.sin((x * 0.105) + Math.sin(y * 0.19 + t * 0.64) * 3.6 + t * 1.28);
        const currentB = Math.cos((y * 0.265) - Math.cos(x * 0.045 - t * 0.52) * 5.1 - t * 1.05);
        const sonar = Math.sin(Math.hypot(nx - 0.22, ny - 0.78) * 34.0 - t * 2.3);
        const moonPull = Math.cos((nx - ny) * 9.5 + Math.sin(t * 0.42) * 2.2);
        return (gyre + currentA + currentB + sonar + moonPull) / 5;
      }

      function hueFor(x, y, t, v) {
        const nx = x / Math.max(1, cols - 1);
        const ny = y / Math.max(1, rows - 1);
        const lagoon = 178 + 38 * Math.sin(t * 0.55 + x * 0.025);
        const abyss = 218 + 34 * Math.cos(t * 0.36 + y * 0.04);
        const coral = 318 + 36 * Math.sin((x + y) * 0.027 - t * 0.68);
        const gold = 42 + 28 * Math.cos((nx - ny) * 6.0 + t * 0.9);
        if (ny < 0.30) return (abyss + v * 54 + 360) % 360;
        if (ny > 0.72) return (gold + lagoon * 0.16 + v * 45 + 360) % 360;
        if (nx > 0.67) return (coral + v * 42 + 360) % 360;
        return (lagoon + v * 60 + 360) % 360;
      }

      function render(now) {
        if (now - previous < 44) {
          raf = requestAnimationFrame(render);
          return;
        }
        previous = now;
        const t = now * 0.001;
        const sigW = compass[0].length;
        const sigH = compass.length;
        const sigX = Math.floor((cols - sigW) / 2);
        const sigY = Math.floor(rows * 0.50 - sigH / 2);
        let out = '';

        for (let y = 0; y < rows; y++) {
          let line = '';
          for (let x = 0; x < cols; x++) {
            const v = tide(x, y, t);
            const isle = island(x, y, t);
            const lx = x - sigX;
            const ly = y - sigY;
            const sigChar = ly >= 0 && ly < sigH && lx >= 0 && lx < sigW ? compass[ly][lx] : '';
            const normalized = (v + 1) * 0.5;
            const shelf = Math.abs((isle.radius * 5.6 + 0.13 * Math.sin(isle.angle * 7 + t)) % 0.48 - 0.24) < 0.018;
            const meridian = Math.abs(Math.sin((x - cols * 0.5) * 0.055 + t * 0.33)) < 0.028 && y % 3 === Math.floor(t * 2) % 3;
            const ripple = Math.abs(Math.sin(y * 0.34 + t * 1.55) * cols * 0.10 + cols * (0.24 + 0.06 * Math.sin(t)) - x) < cols * 0.010;
            const trench = Math.abs(Math.cos(y * 0.18 - t * 0.72) * cols * 0.16 + cols * 0.78 - x) < cols * 0.012;
            const biolume = ((x * 17 + y * 43 + Math.floor(t * 15)) % 353) === 0;
            const spray = normalized > 0.78 && ((x * 13 + y * 7 + Math.floor(t * 20)) % 61) === 0;

            let ch = depths[clamp(Math.floor(normalized * (depths.length - 1)), 0, depths.length - 1)];
            if (shelf) ch = contour[(x + y + Math.floor(t * 4)) % contour.length];
            if (meridian) ch = ['тФК', 'тФЛ', 'тХО', 'тХП'][(y + Math.floor(t * 3)) % 4];
            if (ripple) ch = ['тЙИ', 'тЙЛ', 'тИ┐', '~', 'я╣П'][(x + Math.floor(t * 7)) % 5];
            if (trench) ch = ['тХ▓', 'тХ▒', 'тХ│', 'тЧЬ', 'тЧЭ', 'тЧЯ', 'тЧЮ'][(x + y + Math.floor(t * 5)) % 7];
            if (spray) ch = foam[(x + y + Math.floor(t * 9)) % foam.length];
            if (biolume) ch = sparks[(x + y + Math.floor(t * 2)) % sparks.length];
            if (sigChar && sigChar !== ' ') ch = sigChar;

            const h = sigChar ? (48 + 26 * Math.sin(t * 1.4 + x * 0.12)) : hueFor(x, y, t, v);
            const sat = sigChar ? 100 : shelf || ripple || trench ? 96 : 88;
            const light = sigChar ? 83 : biolume ? 76 : shelf ? 66 : ripple || trench ? 62 : 34 + Math.floor(31 * normalized);
            const alpha = sigChar ? 1 : biolume ? 0.98 : 0.55 + 0.40 * normalized;
            line += `<span style="color:hsla(${h.toFixed(1)},${sat}%,${light}%,${alpha.toFixed(2)})">${esc(ch)}</span>`;
          }
          out += line + (y === rows - 1 ? '' : '\n');
        }

        pre.innerHTML = out;
        document.documentElement.dataset.marker = marker;
        raf = requestAnimationFrame(render);
      }

      function blockScroll(event) { event.preventDefault(); }
      addEventListener('resize', resize, { passive: true });
      addEventListener('orientationchange', resize, { passive: true });
      addEventListener('wheel', blockScroll, { passive: false });
      addEventListener('touchmove', blockScroll, { passive: false });
      addEventListener('keydown', event => {
        if ([' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'PageUp', 'PageDown', 'Home', 'End'].includes(event.key)) event.preventDefault();
      }, { passive: false });
      addEventListener('scroll', () => scrollTo(0, 0), { passive: true });
      addEventListener('pagehide', () => cancelAnimationFrame(raf), { passive: true });

      resize();
      raf = requestAnimationFrame(render);
    })();
  </script>
</body>
</html>
