<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>chefin.quest</title>
  <meta name="description" content="A daily browser-native fluid ASCII animation from Chefin." />
  <meta name="daily-ascii-marker" content="DAILY_ASCII_2026-05-26_SAFFRON_CIRCUIT_REEF" />
  <!-- DAILY_ASCII_2026-05-26_SAFFRON_CIRCUIT_REEF -->
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #03020a;
    }
    body {
      position: fixed;
      inset: 0;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeSpeed;
    }
    #reef {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      margin: 0;
      padding: 0;
      border: 0;
      overflow: hidden;
      white-space: pre;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: clamp(9px, 1.16vw, 13px);
      font-weight: 850;
      line-height: .92;
      letter-spacing: -.075em;
      color: #fff4c2;
      background:
        radial-gradient(circle at 19% 27%, rgba(255, 184, 46, .32), transparent 22%),
        radial-gradient(circle at 78% 72%, rgba(0, 255, 210, .25), transparent 26%),
        radial-gradient(circle at 50% 45%, rgba(135, 70, 255, .25), transparent 36%),
        linear-gradient(160deg, #04020b 0%, #120329 28%, #05233a 57%, #2a1302 100%);
      filter: saturate(1.75) contrast(1.07);
      text-shadow:
        0 0 3px currentColor,
        0 0 13px rgba(255, 190, 66, .22),
        0 0 30px rgba(0, 255, 214, .14);
      transform: translateZ(0);
    }
    #reef::selection { background: transparent; }
    .c0 { color: #03020a; text-shadow: none; opacity: .74; }
    .c1 { color: #0b1230; text-shadow: none; opacity: .86; }
    .c2 { color: #143d65; }
    .c3 { color: #0077ff; }
    .c4 { color: #00d6ff; }
    .c5 { color: #18ffd0; }
    .c6 { color: #b4ff65; }
    .c7 { color: #fff36d; }
    .c8 { color: #ffb22d; }
    .c9 { color: #ff6a25; }
    .ca { color: #ff3fa6; }
    .cb { color: #9d6bff; }
    .cc { color: #fff9df; }
  </style>
</head>
<body aria-label="Full-screen colorful fluid ASCII animation">
  <pre id="reef" aria-hidden="true"></pre>
  <script>
    (() => {
      'use strict';

      const MARKER = 'DAILY_ASCII_2026-05-26_SAFFRON_CIRCUIT_REEF';
      const field = document.getElementById('reef');
      const mist = [' ', ' ', '·', '.', '˙', ':', '⁘', '∴'];
      const current = ['~', '≈', '≋', '⌁', '﹋', '﹌', '∿'];
      const coral = ['╱', '╲', '╳', '╬', '╫', '╪', '┼', '╋', '┃', '━'];
      const sparks = ['✦', '✧', '+', '*', '◆', '◇', '◈', '●', '○', '◎'];
      const bubbles = ['○', '◌', '◍', '◉', '⬡', '⬢'];
      const sig = 'CHEFIN.QUEST';
      let cols = 0;
      let rows = 0;
      let cellW = 7;
      let cellH = 11;
      let last = 0;
      let frame = 0;

      const clamp = (n, lo, hi) => Math.max(lo, Math.min(hi, n));
      const esc = (s) => s === '&' ? '&amp;' : s === '<' ? '&lt;' : s === '>' ? '&gt;' : s;

      function measure() {
        const probe = document.createElement('span');
        probe.textContent = 'M';
        probe.style.cssText = 'position:absolute;visibility:hidden;font:inherit;letter-spacing:inherit;line-height:inherit;';
        field.appendChild(probe);
        const box = probe.getBoundingClientRect();
        probe.remove();
        cellW = Math.max(4.6, box.width || 7);
        cellH = Math.max(7.4, box.height || 11);
        cols = clamp(Math.floor(innerWidth / cellW) + 2, 58, 204);
        rows = clamp(Math.floor(innerHeight / cellH) + 2, 32, 104);
      }

      function reefFlow(x, y, t) {
        const nx = (x / cols) * 2 - 1;
        const ny = (y / rows) * 2 - 1;
        const vortex = Math.sin(Math.atan2(ny + .15, nx - .12) * 5.0 + Math.hypot(nx - .12, ny + .15) * 18.0 - t * 2.2);
        const thermal = Math.cos((nx * 8.5) + Math.sin(ny * 6.0 + t * 1.35) * 2.7 + t * .7);
        const filament = Math.sin(x * .17 - y * .075 + Math.sin(t + y * .09) * 4.3);
        const pulse = Math.cos(Math.hypot(nx + .42, ny - .34) * 23.0 - t * 3.1);
        return vortex * .34 + thermal * .25 + filament * .26 + pulse * .22;
      }

      function glyphFor(v, bright, x, y, t) {
        const vein = Math.abs(Math.sin((x * .23) + (y * .19) - t * 2.1 + v * 2.0));
        const reefLine = Math.abs(Math.sin((x - cols * .5) * .08 + Math.pow((y / rows), 1.7) * 11.0 + t * .9));
        const sparkle = Math.sin(x * 12.9898 + y * 78.233 + frame * .37) * 43758.5453;
        const rnd = sparkle - Math.floor(sparkle);
        if (bright > .86 && rnd > .58) return sparks[(x + y + frame) % sparks.length];
        if (reefLine < .115 && bright > .38) return coral[(x * 3 + y + frame) % coral.length];
        if (vein > .91 && bright > .34) return current[(x + frame + y * 2) % current.length];
        if (rnd > .985 && bright > .2) return bubbles[(x + y + frame) % bubbles.length];
        if (bright < .18) return mist[(x + y + frame) % mist.length];
        if (bright < .34) return current[(x * 2 + y + frame) % current.length];
        if (bright < .54) return coral[(x + y * 5 + frame) % coral.length];
        if (bright < .74) return sparks[(x * 7 + y + frame) % sparks.length];
        return bubbles[(x * 5 + y * 3 + frame) % bubbles.length];
      }

      function colorClass(bright, x, y, t) {
        const band = Math.sin((x / cols) * 8.2 - (y / rows) * 5.7 + t * 1.8) * .5 + .5;
        const heat = Math.cos(Math.hypot(x - cols * .22, y - rows * .72) * .13 - t * 1.7) * .5 + .5;
        let idx = Math.floor((bright * 8.5) + band * 2.2 + heat * 1.3);
        idx = clamp(idx, 0, 12);
        return ['c0','c1','c2','c3','c4','c5','c6','c7','c8','c9','ca','cb','cc'][idx];
      }

      function signatureGlyph(x, y, t) {
        const sy = Math.floor(rows * .53 + Math.sin(t * .8) * rows * .035);
        const start = Math.floor((cols - sig.length) * .5);
        if (y !== sy || x < start || x >= start + sig.length) return null;
        const shimmer = Math.sin(t * 5 + (x - start) * .8) > -.35;
        return shimmer ? sig[x - start] : sparks[(x + frame) % sparks.length];
      }

      function draw(now) {
        requestAnimationFrame(draw);
        if (now - last < 38) return;
        last = now;
        frame++;
        const t = now * .001;
        const html = [];
        for (let y = 0; y < rows; y++) {
          for (let x = 0; x < cols; x++) {
            const nx = x / cols;
            const ny = y / rows;
            const v = reefFlow(x, y, t);
            const caustic = Math.sin((nx * 17.0) + Math.cos(ny * 9.0 + t) * 3.0 - t * 2.4) * .18;
            const bloom = Math.exp(-Math.hypot(nx - .73 - Math.sin(t * .22) * .09, ny - .34 - Math.cos(t * .18) * .07) * 4.1);
            const ember = Math.exp(-Math.hypot(nx - .24 - Math.cos(t * .2) * .06, ny - .74 - Math.sin(t * .24) * .05) * 4.6);
            const bright = clamp(.43 + v * .31 + caustic + bloom * .36 + ember * .28, 0, 1);
            const signed = signatureGlyph(x, y, t);
            const glyph = signed || glyphFor(v, bright, x, y, t);
            const cls = signed ? 'cc' : colorClass(bright, x, y, t);
            html.push('<span class="', cls, '">', esc(glyph), '</span>');
          }
          if (y !== rows - 1) html.push('\n');
        }
        field.innerHTML = html.join('');
      }

      function resize() {
        measure();
        field.textContent = '';
      }

      const stop = (event) => event.preventDefault();
      const stopKeys = new Set(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','PageUp','PageDown','Home','End',' ']);
      addEventListener('wheel', stop, { passive: false });
      addEventListener('touchmove', stop, { passive: false });
      addEventListener('keydown', (event) => { if (stopKeys.has(event.key)) event.preventDefault(); }, { passive: false });
      addEventListener('resize', resize, { passive: true });
      addEventListener('orientationchange', resize, { passive: true });

      field.dataset.marker = MARKER;
      resize();
      requestAnimationFrame(draw);
    })();
  </script>
</body>
</html>
