<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>chefin.quest</title>
  <meta name="description" content="A daily browser-native fluid ASCII animation from Chefin." />
  <meta name="daily-ascii-marker" content="DAILY_ASCII_2026-05-22_CHROMA_COMET_FORGE" />
  <!-- DAILY_ASCII_2026-05-22_CHROMA_COMET_FORGE -->
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #02010a;
    }
    body {
      position: fixed;
      inset: 0;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeSpeed;
    }
    #forge {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      margin: 0;
      padding: 0;
      border: 0;
      overflow: hidden;
      white-space: pre;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      font-weight: 900;
      line-height: 0.94;
      letter-spacing: -0.075em;
      color: #fff6d8;
      background:
        radial-gradient(circle at 50% 52%, rgba(255, 231, 86, 0.27), transparent 16%),
        radial-gradient(circle at 38% 46%, rgba(255, 72, 120, 0.19), transparent 23%),
        radial-gradient(circle at 66% 44%, rgba(60, 239, 255, 0.18), transparent 24%),
        radial-gradient(ellipse at 50% 106%, rgba(142, 53, 255, 0.27), transparent 38%),
        linear-gradient(140deg, #02010a 0%, #08031a 34%, #120823 62%, #03020b 100%);
      filter: saturate(1.75) contrast(1.13);
      text-shadow:
        0 0 4px currentColor,
        0 0 14px rgba(255, 181, 57, .28),
        0 0 28px rgba(65, 225, 255, .14);
      transform: translateZ(0);
    }
    #forge::selection { background: transparent; }
    .c0 { color: #05051a; text-shadow: none; opacity: .78; }
    .c1 { color: #17104a; text-shadow: none; opacity: .86; }
    .c2 { color: #3149ff; }
    .c3 { color: #16d9ff; }
    .c4 { color: #25ffc4; }
    .c5 { color: #fff56d; }
    .c6 { color: #ffb03f; }
    .c7 { color: #ff4f7d; }
    .c8 { color: #d95bff; }
    .c9 { color: #fffdf1; }
    .ca { color: #7a59ff; }
  </style>
</head>
<body aria-label="Full-screen colorful fluid ASCII animation">
  <pre id="forge" aria-hidden="true"></pre>
  <script>
    (() => {
      'use strict';

      const MARKER = 'DAILY_ASCII_2026-05-22_CHROMA_COMET_FORGE';
      const pre = document.getElementById('forge');
      const glyphs = '  ..,,--~~::;;==++**##%%@@';
      const sparks = ['·', '.', ',', ':', ';', '+', '*', '✦', '◆', '◇'];
      let cols = 0, rows = 0, cw = 8, ch = 11, last = 0;
      const targetMs = 1000 / 24;
      const TAU = Math.PI * 2;

      function fit() {
        const probe = document.createElement('span');
        probe.textContent = 'MMMMMMMMMM\nMMMMMMMMMM';
        probe.style.cssText = 'position:absolute;visibility:hidden;font:900 12px/0.94 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;letter-spacing:-0.075em;white-space:pre;';
        document.body.appendChild(probe);
        const r = probe.getBoundingClientRect();
        document.body.removeChild(probe);
        cw = Math.max(4.2, r.width / 10);
        ch = Math.max(7.5, r.height / 2);
        cols = Math.max(44, Math.ceil(innerWidth / cw) + 2);
        rows = Math.max(24, Math.ceil(innerHeight / ch) + 1);
        pre.style.fontSize = '12px';
      }

      function esc(s) {
        return s === '&' ? '&amp;' : s === '<' ? '&lt;' : s === '>' ? '&gt;' : s;
      }

      function field(x, y, t) {
        const nx = (x / cols - 0.5) * 2.18;
        const ny = (y / rows - 0.5) * 1.72;
        const r = Math.hypot(nx, ny) + 0.0001;
        const a = Math.atan2(ny, nx);

        const swirl = Math.sin(13.0 * r - 2.35 * t + 4.2 * Math.sin(a * 3 - t * .55));
        const helix = Math.sin(9.0 * (a + 0.38 * Math.sin(t * .7)) + 7.7 * r - t * 2.15);
        const flame = Math.sin((nx * 7.2 - ny * 3.1) + t * 1.4) * Math.cos((ny * 8.3 + nx * 2.6) - t * .8);
        const core = Math.exp(-r * 3.25) * 2.8;

        let comet = 0;
        for (let i = 0; i < 4; i++) {
          const phase = t * (0.37 + i * .055) + i * TAU / 4;
          const cx = Math.cos(phase) * (0.33 + 0.18 * Math.sin(t * .31 + i));
          const cy = Math.sin(phase * 1.23) * (0.24 + 0.12 * Math.cos(t * .27 + i));
          const dx = nx - cx;
          const dy = ny - cy;
          const tail = Math.max(0, 1 - Math.hypot(dx * 2.5, dy * 3.4));
          const wake = Math.max(0, 1 - Math.abs(Math.sin(Math.atan2(dy, dx) - phase)) * 5) * Math.max(0, 0.9 - Math.hypot(dx, dy));
          comet += tail * 1.75 + wake * .88;
        }

        const ring = Math.exp(-Math.abs(r - (0.45 + 0.055 * Math.sin(t * .9))) * 13.5);
        const value = core + comet + ring * 1.15 + swirl * .46 + helix * .36 + flame * .24;
        const hue = (a / TAU + 1 + t * .035 + r * .56 + comet * .08) % 1;
        return { value, hue, r };
      }

      function render(now) {
        requestAnimationFrame(render);
        if (now - last < targetMs) return;
        last = now;
        const t = now * 0.001;
        let html = '';

        for (let y = 0; y < rows; y++) {
          for (let x = 0; x < cols; x++) {
            const f = field(x, y, t);
            let v = f.value;
            const glint = Math.sin((x * 12.9898 + y * 78.233) * 0.09 + t * 4.2);
            if (glint > 0.985 && v > 0.15) v += 1.25;
            const idx = Math.max(0, Math.min(glyphs.length - 1, Math.floor((v + 1.05) * 5.75)));
            let g = glyphs[idx];
            if (v > 2.85) g = sparks[(x + y + Math.floor(t * 8)) % sparks.length];
            const band = Math.max(0, Math.min(10, Math.floor(f.hue * 10.999)));
            const cls = v < -0.38 ? 'c0' : v < 0.05 ? 'c1' : 'c' + (band === 10 ? 'a' : band);
            html += '<span class="' + cls + '">' + esc(g) + '</span>';
          }
          if (y !== rows - 1) html += '\n';
        }
        pre.innerHTML = html;
      }

      function blockMotion(e) { e.preventDefault(); }
      addEventListener('wheel', blockMotion, { passive: false });
      addEventListener('touchmove', blockMotion, { passive: false });
      addEventListener('scroll', () => scrollTo(0, 0), { passive: true });
      addEventListener('keydown', (e) => {
        if ([' ', 'PageDown', 'PageUp', 'Home', 'End', 'ArrowDown', 'ArrowUp', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
      }, { passive: false });
      addEventListener('resize', fit, { passive: true });
      document.documentElement.dataset.marker = MARKER;
      fit();
      requestAnimationFrame(render);
    })();
  </script>
</body>
</html>
