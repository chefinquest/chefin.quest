<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>chefin.quest</title>
  <meta name="description" content="A daily browser-native fluid ASCII animation from Chefin." />
  <meta name="daily-ascii-marker" content="DAILY_ASCII_2026-05-16_AURORA_RAMEN_NEBULA" />
  <!-- DAILY_ASCII_2026-05-16_AURORA_RAMEN_NEBULA -->
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #02020a;
    }
    body {
      position: fixed;
      inset: 0;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }
    #aurora-ramen {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      margin: 0;
      padding: clamp(3px, 0.75vmin, 12px);
      border: 0;
      overflow: hidden;
      white-space: pre;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-weight: 850;
      line-height: 0.84;
      letter-spacing: -0.034em;
      color: #eaffff;
      background:
        radial-gradient(circle at 50% 58%, rgba(255, 198, 76, 0.16), transparent 13%),
        radial-gradient(ellipse at 24% 22%, rgba(28, 255, 178, 0.28), transparent 35%),
        radial-gradient(ellipse at 76% 18%, rgba(182, 77, 255, 0.24), transparent 33%),
        radial-gradient(ellipse at 56% 86%, rgba(255, 83, 126, 0.18), transparent 31%),
        linear-gradient(160deg, #00020b 0%, #041322 35%, #130322 65%, #05030c 100%);
      filter: saturate(1.75) contrast(1.13);
      text-shadow:
        0 0 3px currentColor,
        0 0 12px rgba(74, 255, 216, 0.28),
        0 0 26px rgba(255, 89, 177, 0.16);
      transform: translateZ(0);
    }
    #aurora-ramen::selection { background: transparent; }
    .c0 { color: #172033; text-shadow: none; opacity: 0.72; }
    .c1 { color: #18f6c8; }
    .c2 { color: #4cbcff; }
    .c3 { color: #b875ff; }
    .c4 { color: #ff5bbd; }
    .c5 { color: #ffd166; }
    .c6 { color: #fff4cc; }
    .c7 { color: #ff8a4c; }
  </style>
</head>
<body aria-label="Full-screen colorful fluid ASCII animation">
  <pre id="aurora-ramen" aria-hidden="true"></pre>
  <script>
    (() => {
      'use strict';

      const marker = 'DAILY_ASCII_2026-05-16_AURORA_RAMEN_NEBULA';
      const pre = document.getElementById('aurora-ramen');
      const haze = '    ...,,,---~~~:::===+++***###%%%@@@';
      const noodles = ['╭','╮','╯','╰','─','│','╱','╲','~','≈','∿','⌁'];
      const glints = ['✦','✧','✶','✺','✹','✷','◆','◇','◌','○','●','*'];
      const steam = ['⠁','⠂','⠄','⠆','⠒','⠢','⠔','⠌','⠨','⋰','⋱','⋯'];
      const sigil = [
        '        ╭────────╮        ',
        '     ╭──┤ CHEFIN ├──╮     ',
        '  ≋≋ │  QUEST  ☾  │ ≋≋  ',
        '     ╰──┤ RAMEN ├──╯     ',
        '        ╰────────╯        '
      ];

      let cols = 0;
      let rows = 0;
      let charW = 9;
      let charH = 10;
      let last = 0;
      let frame = 0;
      let raf = 0;
      let sigX = 0;
      let sigY = 0;

      const clamp = (n, a, b) => Math.max(a, Math.min(b, n));
      const esc = (ch) => ch === '&' ? '&amp;' : ch === '<' ? '&lt;' : ch === '>' ? '&gt;' : ch;
      const wave = (x, y, t) =>
        Math.sin(x * 0.115 + t * 1.10) +
        Math.cos(y * 0.155 - t * 0.82) +
        Math.sin((x + y) * 0.052 + t * 0.67) +
        Math.cos(Math.hypot(x - cols * 0.50, y - rows * 0.58) * 0.105 - t * 1.28);

      function measure() {
        const probe = document.createElement('span');
        probe.textContent = 'MMMMMMMMMM\nMMMMMMMMMM';
        probe.style.cssText = 'position:absolute;visibility:hidden;white-space:pre;font:inherit;line-height:inherit;letter-spacing:inherit;';
        pre.appendChild(probe);
        const rect = probe.getBoundingClientRect();
        charW = rect.width / 10 || 9;
        charH = rect.height / 2 || 10;
        probe.remove();
      }

      function resize() {
        pre.style.fontSize = `${clamp(Math.min(innerWidth / 72, innerHeight / 34), 8.2, 18)}px`;
        measure();
        const style = getComputedStyle(pre);
        const padX = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
        const padY = parseFloat(style.paddingTop) + parseFloat(style.paddingBottom);
        cols = Math.max(48, Math.floor((innerWidth - padX) / charW));
        rows = Math.max(24, Math.floor((innerHeight - padY) / charH));
        sigX = Math.max(0, Math.floor((cols - sigil[0].length) / 2));
        sigY = Math.max(2, Math.floor(rows * 0.48) - 2);
        draw(performance.now());
      }

      function sigilChar(x, y) {
        const sy = y - sigY;
        if (sy < 0 || sy >= sigil.length) return '';
        const sx = x - sigX;
        if (sx < 0 || sx >= sigil[sy].length) return '';
        const ch = sigil[sy][sx];
        return ch === ' ' ? '' : ch;
      }

      function draw(now) {
        raf = requestAnimationFrame(draw);
        if (now - last < 42) return;
        last = now;
        frame += 1;
        const t = now * 0.001;
        const out = [];

        for (let y = 0; y < rows; y++) {
          let prevClass = '';
          for (let x = 0; x < cols; x++) {
            const cx = x / cols - 0.5;
            const cy = y / rows - 0.5;
            const radius = Math.hypot(cx * 1.8, cy * 1.45);
            const broth = Math.sin((x * 0.23) + Math.sin(y * 0.19 + t) * 2.1 - t * 2.2);
            const aurora = wave(x, y, t) - radius * 2.05;
            const bowl = Math.abs((y - rows * 0.64) - Math.sin((x - cols * 0.5) * 0.08 + t * 1.3) * 2.2);
            const rim = y > rows * 0.50 && y < rows * 0.82 && Math.abs(radius - 0.54) < 0.03 + 0.015 * Math.sin(t + x * 0.18);
            const moon = Math.hypot(x - cols * 0.78, y - rows * 0.18) < Math.max(2.2, rows * 0.045);
            const s = sigilChar(x, y);
            let ch = ' ';
            let cls = 'c0';

            if (moon) {
              ch = (x + y + frame) % 7 < 2 ? '☾' : '◐';
              cls = 'c6';
            } else if (s) {
              ch = s;
              cls = ['c5','c6','c7','c4'][(x + y + Math.floor(t * 5)) & 3];
            } else if (rim) {
              ch = noodles[(x + y + frame) % noodles.length];
              cls = ['c5','c7','c4'][Math.abs(Math.floor(aurora * 3)) % 3];
            } else if (y > rows * 0.56 && y < rows * 0.84 && bowl < 1.15) {
              ch = noodles[Math.abs(Math.floor((broth + aurora) * 8 + x)) % noodles.length];
              cls = ['c7','c5','c6','c4'][Math.abs(Math.floor(broth * 6 + t)) % 4];
            } else if ((aurora > 1.06 && ((x + Math.floor(t * 8)) % 3)) || Math.abs(broth + cy * 2.4) < 0.05) {
              ch = glints[Math.abs(Math.floor(aurora * 11 + x - y + frame)) % glints.length];
              cls = ['c1','c2','c3','c4','c5'][Math.abs(Math.floor((aurora + radius) * 5)) % 5];
            } else if (aurora > -0.45) {
              const idx = clamp(Math.floor((aurora + 0.55) * 7.8), 0, haze.length - 1);
              ch = haze[idx];
              cls = ['c1','c2','c3','c4'][Math.abs(Math.floor((aurora + t + cx) * 4)) % 4];
            } else if (y < rows * 0.55 && Math.sin(x * 0.31 + y * 0.17 - t * 2.4) > 0.92) {
              ch = steam[(x * 5 + y * 3 + frame) % steam.length];
              cls = ['c1','c2','c3'][Math.abs(x + frame) % 3];
            } else if (((x * 13 + y * 7 + frame) % 173) === 0) {
              ch = '·';
              cls = 'c2';
            }

            if (cls !== prevClass) {
              if (prevClass) out.push('</span>');
              out.push('<span class="', cls, '">');
              prevClass = cls;
            }
            out.push(esc(ch));
          }
          if (prevClass) out.push('</span>');
          if (y !== rows - 1) out.push('\n');
        }
        pre.innerHTML = out.join('');
      }

      function preventScroll(event) { event.preventDefault(); }
      addEventListener('wheel', preventScroll, { passive: false });
      addEventListener('touchmove', preventScroll, { passive: false });
      addEventListener('keydown', (event) => {
        if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','PageUp','PageDown','Home','End',' '].includes(event.key)) {
          event.preventDefault();
        }
      }, { passive: false });
      addEventListener('resize', resize, { passive: true });
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) cancelAnimationFrame(raf);
        else { last = 0; raf = requestAnimationFrame(draw); }
      });

      document.documentElement.dataset.dailyAsciiMarker = marker;
      resize();
    })();
  </script>
</body>
</html>
