<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>chefin.quest</title>
  <meta name="description" content="A daily browser-native fluid ASCII animation from Chefin." />
  <meta name="daily-ascii-marker" content="DAILY_ASCII_2026-05-18_AURORA_EMBER_LABYRINTH" />
  <!-- DAILY_ASCII_2026-05-18_AURORA_EMBER_LABYRINTH -->
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #030006;
    }
    body {
      position: fixed;
      inset: 0;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }
    #field {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      margin: 0;
      padding: clamp(2px, 0.48vmin, 8px);
      border: 0;
      overflow: hidden;
      white-space: pre;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      font-weight: 900;
      line-height: 0.86;
      letter-spacing: -0.055em;
      color: #fff5da;
      background:
        radial-gradient(ellipse at 18% 78%, rgba(255, 104, 36, 0.20), transparent 32%),
        radial-gradient(ellipse at 80% 70%, rgba(255, 33, 124, 0.19), transparent 30%),
        radial-gradient(ellipse at 50% 12%, rgba(77, 255, 204, 0.26), transparent 40%),
        radial-gradient(ellipse at 44% 52%, rgba(127, 55, 255, 0.20), transparent 42%),
        linear-gradient(180deg, #040014 0%, #071028 42%, #17020c 72%, #050005 100%);
      filter: saturate(1.75) contrast(1.13);
      text-shadow:
        0 0 3px currentColor,
        0 0 12px rgba(87, 255, 214, 0.28),
        0 0 24px rgba(255, 77, 33, 0.20);
      transform: translateZ(0);
    }
    #field::selection { background: transparent; }
    .c0 { color: #14152b; text-shadow: none; opacity: 0.78; }
    .c1 { color: #33ffd7; }
    .c2 { color: #69a8ff; }
    .c3 { color: #a55dff; }
    .c4 { color: #ff4fca; }
    .c5 { color: #ff7040; }
    .c6 { color: #ffd166; }
    .c7 { color: #fff8df; }
    .c8 { color: #7dff68; }
    .c9 { color: #ff2f5f; }
  </style>
</head>
<body aria-label="Full-screen colorful fluid ASCII animation">
  <pre id="field" aria-hidden="true"></pre>
  <script>
    (() => {
      'use strict';

      const marker = 'DAILY_ASCII_2026-05-18_AURORA_EMBER_LABYRINTH';
      const pre = document.getElementById('field');
      const mist = '     .·:;+=xX#%@';
      const aurora = ['~','≈','∿','≋','⌁','╱','╲','╳','∕','∖','⟋','⟍'];
      const ember = ['·','∙','°','*','+','✦','✧','✶','✷','✺'];
      const maze = ['╭','╮','╰','╯','│','─','┼','╋','╬','╠','╣','╦','╩','═','║'];
      const crystal = ['◇','◆','◈','⬡','⬢','△','▽','◬','◭','✦'];
      const sigil = [
        '      ╭────────╮      ',
        '   ╭── CHEFIN ──╮   ',
        '  ╰── QUEST ∴ FLUX ─╯ ',
        '   ╰── AURORA ──╯   ',
        '      ╰────────╯      '
      ];

      let cols = 0;
      let rows = 0;
      let charW = 9;
      let charH = 10;
      let last = 0;
      let frame = 0;
      let raf = 0;
      let sigilX = 0;
      let sigilY = 0;

      const clamp = (n, a, b) => Math.max(a, Math.min(b, n));
      const esc = (ch) => ch === '&' ? '&amp;' : ch === '<' ? '&lt;' : ch === '>' ? '&gt;' : ch;
      const wave = (x, y, t) =>
        Math.sin(x * 0.071 + t * 1.28 + Math.sin(y * 0.033 + t) * 1.6) +
        Math.cos(y * 0.123 - t * 1.04 + Math.cos(x * 0.041) * 1.1) +
        Math.sin((x + y) * 0.047 - t * 0.74) +
        Math.cos(Math.hypot(x - cols * 0.5, y - rows * 0.58) * 0.135 - t * 2.2);

      function measure() {
        const probe = document.createElement('span');
        probe.textContent = 'MMMMMMMMMM\nMMMMMMMMMM';
        probe.style.cssText = 'position:absolute;visibility:hidden;white-space:pre;font:inherit;line-height:inherit;letter-spacing:inherit;';
        pre.appendChild(probe);
        const rect = probe.getBoundingClientRect();
        charW = rect.width / 10 || 9;
        charH = rect.height / 2 || 10;
        probe.remove();
      }

      function resize() {
        pre.style.fontSize = `${clamp(Math.min(innerWidth / 82, innerHeight / 38), 7.2, 17)}px`;
        measure();
        const style = getComputedStyle(pre);
        const padX = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
        const padY = parseFloat(style.paddingTop) + parseFloat(style.paddingBottom);
        cols = Math.max(52, Math.floor((innerWidth - padX) / charW));
        rows = Math.max(26, Math.floor((innerHeight - padY) / charH));
        sigilX = Math.max(0, Math.floor((cols - sigil[0].length) / 2));
        sigilY = Math.max(2, Math.floor(rows * 0.50) - 2);
        draw(performance.now());
      }

      function sigilChar(x, y) {
        const sy = y - sigilY;
        if (sy < 0 || sy >= sigil.length) return '';
        const sx = x - sigilX;
        if (sx < 0 || sx >= sigil[sy].length) return '';
        const ch = sigil[sy][sx];
        return ch === ' ' ? '' : ch;
      }

      function append(out, ch, cls, previous) {
        if (cls !== previous.value) {
          if (previous.value) out.push('</span>');
          out.push('<span class="', cls, '">');
          previous.value = cls;
        }
        out.push(esc(ch));
      }

      function draw(now) {
        raf = requestAnimationFrame(draw);
        if (now - last < 42) return;
        last = now;
        frame += 1;
        const t = now * 0.001;
        const cx = cols * 0.5 + Math.sin(t * 0.25) * cols * 0.06;
        const cy = rows * 0.54 + Math.cos(t * 0.22) * rows * 0.04;
        const out = [];

        for (let y = 0; y < rows; y++) {
          const prev = { value: '' };
          const yn = y / Math.max(1, rows - 1);
          for (let x = 0; x < cols; x++) {
            const xn = x / Math.max(1, cols - 1);
            const dx = (x - cx) / Math.max(1, cols);
            const dy = (y - cy) / Math.max(1, rows);
            const ang = Math.atan2(dy * 1.45, dx * 2.0);
            const rad = Math.hypot(dx * 2.0, dy * 1.45);
            const v = wave(x, y, t);
            const curtain = Math.sin(x * 0.055 + t * 0.95 + Math.sin(y * 0.08 + t * 0.55) * 2.2);
            const borealis = yn < 0.62 && Math.abs(curtain + (yn - 0.2) * 1.45) < 0.42;
            const labyrinth = Math.abs(Math.sin(x * 0.18 + Math.sin(y * 0.12 + t) * 1.8)) < 0.035 || Math.abs(Math.cos(y * 0.22 + t * 0.72 + Math.sin(x * 0.06))) < 0.026;
            const ring = Math.abs(rad - (0.25 + 0.025 * Math.sin(ang * 6 - t * 1.8)));
            const emberFall = y > rows * 0.35 && Math.abs(Math.sin(x * 0.31 + y * 0.17 + t * 2.9)) < 0.018;
            const shard = Math.abs(Math.sin((x - y) * 0.075 + t * 1.35)) < 0.013 && v > 1.15;
            const s = sigilChar(x, y);
            let ch = ' ';
            let cls = 'c0';

            if (s) {
              ch = s;
              cls = ['c7','c6','c1','c4','c5'][Math.abs(x + y + frame) % 5];
            } else if (ring < 0.012 || (rad < 0.21 && Math.abs(Math.sin(ang * 9 + rad * 35 - t * 3.4)) < 0.18)) {
              ch = maze[Math.abs(Math.floor(ang * 11 + rad * 90 + frame)) % maze.length];
              cls = ['c3','c4','c5','c6','c7'][Math.abs(Math.floor(ang * 5 + frame)) % 5];
            } else if (borealis) {
              ch = aurora[Math.abs(Math.floor((curtain + v) * 7 + x + frame)) % aurora.length];
              cls = ['c1','c2','c3','c4','c8'][Math.abs(Math.floor((curtain + yn) * 5 + y)) % 5];
            } else if (emberFall) {
              ch = ember[Math.abs(Math.floor(t * 16 + x * 3 + y)) % ember.length];
              cls = ['c5','c6','c9','c7'][Math.abs(x + y + frame) % 4];
            } else if (shard) {
              ch = crystal[Math.abs(Math.floor(v * 9 + x - y + frame)) % crystal.length];
              cls = ['c1','c2','c4','c7'][Math.abs(Math.floor(v * 4 + x)) % 4];
            } else if (labyrinth && y > rows * 0.24) {
              ch = maze[Math.abs(Math.floor(x * 0.7 + y * 1.9 + frame * 0.35)) % maze.length];
              cls = ['c0','c3','c5','c6'][Math.abs(Math.floor(v * 3 + y)) % 4];
            } else if (v > -0.48) {
              const idx = clamp(Math.floor((v + 0.55) * 4.8), 0, mist.length - 1);
              ch = mist[idx];
              cls = ['c0','c1','c2','c3','c4','c5'][Math.abs(Math.floor(v * 3 + yn * 7 + t)) % 6];
            } else if (((x * 19 + y * 37 + frame) % 239) === 0) {
              ch = '·';
              cls = 'c2';
            }

            append(out, ch, cls, prev);
          }
          if (prev.value) out.push('</span>');
          if (y < rows - 1) out.push('\n');
        }
        pre.innerHTML = out.join('');
      }

      function block(e) { e.preventDefault(); }
      function blockKeys(e) {
        if ([' ', 'PageUp', 'PageDown', 'End', 'Home', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
      }

      addEventListener('resize', resize, { passive: true });
      addEventListener('orientationchange', resize, { passive: true });
      addEventListener('wheel', block, { passive: false });
      addEventListener('touchmove', block, { passive: false });
      addEventListener('keydown', blockKeys, { passive: false });
      addEventListener('scroll', () => scrollTo(0, 0), { passive: true });
      document.documentElement.dataset.marker = marker;
      resize();
    })();
  </script>
</body>
</html>
