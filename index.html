<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>chefin.quest</title>
  <meta name="description" content="A daily browser-native fluid ASCII animation from Chefin." />
  <meta name="daily-ascii-marker" content="DAILY_ASCII_2026-05-23_ABYSSAL_PRISM_KELP" />
  <!-- DAILY_ASCII_2026-05-23_ABYSSAL_PRISM_KELP -->
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #01030b;
    }
    body {
      position: fixed;
      inset: 0;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeSpeed;
    }
    #reef {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      margin: 0;
      padding: 0;
      border: 0;
      overflow: hidden;
      white-space: pre;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      font-weight: 850;
      line-height: 0.92;
      letter-spacing: -0.08em;
      color: #dffcff;
      background:
        radial-gradient(circle at 50% 54%, rgba(64, 255, 223, 0.18), transparent 18%),
        radial-gradient(circle at 22% 80%, rgba(255, 61, 174, 0.24), transparent 21%),
        radial-gradient(circle at 78% 20%, rgba(151, 93, 255, 0.22), transparent 26%),
        radial-gradient(ellipse at 50% 112%, rgba(15, 229, 169, 0.32), transparent 42%),
        linear-gradient(180deg, #01030b 0%, #03102a 37%, #081237 66%, #030615 100%);
      filter: saturate(1.55) contrast(1.12);
      text-shadow:
        0 0 4px currentColor,
        0 0 13px rgba(76, 243, 255, .27),
        0 0 31px rgba(255, 55, 178, .13);
      transform: translateZ(0);
    }
    #reef::selection { background: transparent; }
    .p0 { color: #020617; text-shadow: none; opacity: .72; }
    .p1 { color: #082657; text-shadow: none; opacity: .85; }
    .p2 { color: #0e6bdc; }
    .p3 { color: #16e7ff; }
    .p4 { color: #24ffd7; }
    .p5 { color: #aaff72; }
    .p6 { color: #fff06f; }
    .p7 { color: #ff7a42; }
    .p8 { color: #ff4eb8; }
    .p9 { color: #b983ff; }
    .pa { color: #f2ffff; }
  </style>
</head>
<body aria-label="Full-screen colorful fluid ASCII animation">
  <pre id="reef" aria-hidden="true"></pre>
  <script>
    (() => {
      'use strict';

      const MARKER = 'DAILY_ASCII_2026-05-23_ABYSSAL_PRISM_KELP';
      const reef = document.getElementById('reef');
      const glyphs = [' ', '·', '˙', '.', ':', '∿', '~', '-', '+', '*', 'x', 'o', 'O', '0', '@', '#'];
      const fronds = ['╱', '╲', '│', '╽', '╿', '┃', '╎', '╏'];
      const bubbles = ['°', 'º', '○', '◌', '◦'];
      let cols = 0;
      let rows = 0;
      let cellW = 8;
      let cellH = 11;
      let last = 0;
      let frame = 0;

      const clamp = (n, lo, hi) => Math.max(lo, Math.min(hi, n));
      const esc = (s) => s === '&' ? '&amp;' : s === '<' ? '&lt;' : s === '>' ? '&gt;' : s;

      function measure() {
        const probe = document.createElement('span');
        probe.textContent = 'M';
        probe.style.cssText = 'position:absolute;visibility:hidden;font:inherit;letter-spacing:inherit;line-height:inherit;';
        reef.appendChild(probe);
        const box = probe.getBoundingClientRect();
        probe.remove();
        cellW = Math.max(4.6, box.width || 7.2);
        cellH = Math.max(7.5, box.height || 10.8);
        cols = clamp(Math.floor(innerWidth / cellW) + 2, 48, 190);
        rows = clamp(Math.floor(innerHeight / cellH) + 2, 28, 96);
      }

      function current(x, y, t) {
        const nx = x / cols;
        const ny = y / rows;
        const tide = Math.sin(nx * 9.0 - t * 1.35 + Math.sin(ny * 5.2 + t * .7));
        const undertow = Math.cos((nx + ny) * 11.0 + t * .9);
        const vortex = Math.sin(Math.hypot(nx - .50, ny - .56) * 23.0 - t * 2.15);
        const kelp = Math.sin((x * .31) + Math.sin(y * .12 + t) * 2.8 + t * 1.5);
        return tide * .43 + undertow * .27 + vortex * .38 + kelp * .25;
      }

      function render(now) {
        if (now - last < 42) {
          requestAnimationFrame(render);
          return;
        }
        last = now;
        frame++;
        const t = now * 0.001;
        const cx = cols * (.50 + Math.sin(t * .18) * .035);
        const cy = rows * (.55 + Math.cos(t * .16) * .055);
        const html = [];

        for (let y = 0; y < rows; y++) {
          const depth = y / Math.max(1, rows - 1);
          for (let x = 0; x < cols; x++) {
            const dx = (x - cx) / cols;
            const dy = (y - cy) / rows;
            const r = Math.sqrt(dx * dx * 3.2 + dy * dy * 6.0);
            const ring = Math.sin(r * 72 - t * 3.2);
            const flow = current(x, y, t);
            const shimmer = Math.sin(x * .77 + y * .18 - t * 5.4) * .11;
            const shaft = Math.max(0, Math.sin((x / cols) * Math.PI * 5.0 + t * .7) - .58) * (1 - depth) * .9;
            const reefGlow = Math.max(0, 1 - Math.abs(depth - .79) * 4.1) * (Math.sin(x * .19 + t * 1.7) * .5 + .5);
            const pearl = Math.max(0, .12 - r) * 6.7;
            let v = flow + ring * .38 + shimmer + shaft + reefGlow * .75 + pearl;

            const kelpStalk = depth > .46 && Math.abs(Math.sin(x * .18 + t * .42) * 12 + (x % 23) - 11) < 1.75;
            const bubbleTrail = ((x * 13 + y * 7 + frame) % 89 === 0) || (depth < .58 && ((x + Math.floor(t * 10)) % 37 === 0) && ((y + Math.floor(t * 4)) % 11 === 0));

            let g;
            if (kelpStalk) {
              g = fronds[(x + y + frame) % fronds.length];
              v += .78;
            } else if (bubbleTrail) {
              g = bubbles[(x + y + frame) % bubbles.length];
              v += .95;
            } else {
              const idx = clamp(Math.floor((v + 1.42) * 4.55), 0, glyphs.length - 1);
              g = glyphs[idx];
            }

            let c = clamp(Math.floor((v + 1.25) * 3.7 + depth * 2.2), 0, 10);
            if (shaft > .22) c = clamp(c + 2, 0, 10);
            if (bubbleTrail || pearl > .2) c = 10;
            if (kelpStalk) c = 4 + ((x + frame) % 3);
            html.push('<span class="p', c.toString(16), '">', esc(g), '</span>');
          }
          if (y !== rows - 1) html.push('\n');
        }
        reef.innerHTML = html.join('');
        requestAnimationFrame(render);
      }

      function resize() {
        measure();
        last = 0;
      }

      const block = (event) => event.preventDefault();
      addEventListener('wheel', block, { passive: false });
      addEventListener('touchmove', block, { passive: false });
      addEventListener('keydown', (event) => {
        if ([' ', 'PageUp', 'PageDown', 'End', 'Home', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(event.key)) {
          event.preventDefault();
        }
      }, { passive: false });
      addEventListener('resize', resize, { passive: true });
      addEventListener('orientationchange', resize, { passive: true });

      measure();
      reef.dataset.marker = MARKER;
      requestAnimationFrame(render);
    })();
  </script>
</body>
</html>
